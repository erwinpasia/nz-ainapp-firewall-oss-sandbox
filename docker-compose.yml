version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nz-ai-firewall-postgres
    environment:
      POSTGRES_DB: ai_firewall
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata:
    name: nz-ai-firewall-pgdata
